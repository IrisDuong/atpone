server.port=${PORT_SYS_SETTING_MGTMT}

# database
spring.datasource.url=jdbc:mysql://${DB_HOST_MYSQL}:${DB_PORT_MYSQL}/${DB_NAME_MYSQL}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER_MYSQL}
spring.datasource.password=${DB_PWD_MYSQL}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# logging
logging.level.org.hibernate.sql=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE