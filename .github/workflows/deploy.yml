name: CI/CD ATP One
on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy'
        type: boolean
        default: false
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [config-server, discovery, auth-server, api-gateway]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Debug structure
        run: |
          echo "Current dir:"
          ls backend || echo "no backend"
          echo "Find pom:"
          find . -name "pom.xml"
          echo "github.ref = ${{ github.ref }}"
          echo "github.ref_name = ${{ github.ref_name }}"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push ${{ matrix.service }}
        run: |
          docker build -f backend/atpone-be/${{ matrix.service }}/Dockerfile ${{ secrets.DOCKER_USERNAME }}/atpone-${{ matrix.service }}:1.0 .
  deploy:
    name: Deplpy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: ${{ secrets.SSH_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/opt/apps/spring/atpone

            if [-d ".git"]; then
              git pull origin develop
            else
              git clone https://github.com/IrisDuong/atpone.git .
            fi

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -f

            echo "Deploy ATP One successfully"
